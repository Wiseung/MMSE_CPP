name: cd

on:
  workflow_run:
    workflows: ['ci']
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: production
        type: choice
        options:
          - production

permissions:
  contents: read

jobs:
  deploy-staging:
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: windows-2022
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Create release bundle
        run: python scripts/create_release_bundle.py

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmse_cpp_staging_bundle
          path: dist/mmse_cpp-release.zip

      - name: Deploy to staging
        env:
          MMSE_STAGING_DEPLOY_DIR: ${{ vars.MMSE_STAGING_DEPLOY_DIR != '' && vars.MMSE_STAGING_DEPLOY_DIR || format('{0}/mmse-staging-drop', runner.temp) }}
        run: python scripts/deploy_bundle.py --environment staging

  deploy-production:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-2022
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Create release bundle
        run: python scripts/create_release_bundle.py

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmse_cpp_production_bundle
          path: dist/mmse_cpp-release.zip

      - name: Deploy to production
        env:
          MMSE_PRODUCTION_DEPLOY_DIR: ${{ vars.MMSE_PRODUCTION_DEPLOY_DIR }}
        run: python scripts/deploy_bundle.py --environment production
